name: CI/CD Pipeline

on:
  push:
    branches: [main, fix/backend]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Node.js)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        working-directory: ./backend-student
        run: npm install

      - name: Check backend syntax
        working-directory: ./backend-student
        run: |
          node --check server.js
          node --check src/app.js
          node --check src/seed.js

  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t journal-backend:latest -f Dockerfile.backend .

      - name: Build frontend Docker image
        run: docker build -t journal-frontend:latest -f Dockerfile.frontend .
